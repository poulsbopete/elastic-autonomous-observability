title: Elastic Autonomous Observability
teaser: Send logs, metrics, and traces via OpenTelemetry to Elastic Serverless and
  learn signal correlation, latency investigation, and cost optimization.
description: |
  A hands-on workshop for engineers who want to observe microservices using OpenTelemetry
  and Elastic Serverless. You will configure the OTLP collector, send logs, metrics, and traces,
  correlate signals across services, investigate latency and failures, reduce cardinality for cost,
  and use the AI assistant for troubleshooting. Data understanding and investigation—not deployment.
