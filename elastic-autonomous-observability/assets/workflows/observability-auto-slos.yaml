name: SLO Management and Service Evaluation Workflow

enabled: true

description: |
  Automatically evaluates all services and creates SLOs with relaxed targets.
  Runs every 24 hours. IDEMPOTENT: Deletes all existing SLOs, then creates the 3 standard SLOs
  (Availability, Latency, Error Rate). Each run leaves exactly 3 SLOs, no duplicates.
  SLO Targets: Availability 95%, Error Rate 95%, Latency 85% under 2s.
  Uses environment-provided Kibana base URL + credentials (no hardcoded secrets).

triggers:
  - type: scheduled
    with:
      every: "24h"
  - type: manual

steps:
  - name: workflow-start
    type: console
    with:
      message: |
        ================================================
        SLO Management Workflow - Starting
        ================================================

        Execution ID: {{ execution.id }}
        Timestamp: {{ now | date: '%Y-%m-%d %H:%M:%S UTC' }}

        IDEMPOTENT: This workflow checks for existing SLOs before creating to prevent duplicates.

        ================================================

  - name: get-all-existing-slos
    type: kibana.request
    on-failure:
      continue: true
    with:
      method: "GET"
      path: "/api/observability/slos?perPage=500"
      timeout: '60'
      headers:
        Content-Type: 'application/json'
        Accept: 'application/json'
        kbn-xsrf: 'true'

  - name: loop_over_results
    type: foreach
    foreach: "{{steps.get-all-existing-slos.output.results}}"
    on-failure:
      continue: true
    steps:
      - name: check_SLOs
        type: if
        condition: "foreach.item.name : *Error Rate SLO* OR foreach.item.name : *Latency SLO* OR foreach.item.name : *Availability SLO*"
        steps:
          - name: print-results
            type: console
            with:
              message: "{{foreach.item.name | uniq}}: {{foreach.item.id | uniq}}"
          - name: delete-loop-slo
            type: kibana.request
            on-failure:
              continue: true
            with:
              method: DELETE
              path: /api/observability/slos/{{ foreach.item.id | uniq}}
              headers:
                kbn-xsrf: "true"
        else:
          - name: print-else-results
            type: console
            with:
              message: "{{foreach.item.name | uniq}}: {{foreach.item.id | uniq}}"

  - name: create-slo-availability
    type: kibana.request
    with:
      method: POST
      path: /api/observability/slos
      body:
        name: Availability SLO
        description: Automatically created SLO for service availability - 95% target, grouped by service name
        indicator:
          type: sli.kql.custom
          params:
            index: traces-apm.rum-default*,traces-*.otel-*
            good: NOT event.outcome:failure
            filter: processor.event:transaction
            total: "*"
            timestampField: "@timestamp"
        groupBy:
          - service.name
        budgetingMethod: occurrences
        timeWindow:
          duration: 7d
          type: rolling
        objective:
          target: 0.95
        tags: []
      headers:
        Content-Type: application/json
        Accept: application/json
        kbn-xsrf: "true"

  - name: create-slo-latency
    type: kibana.request
    with:
      method: POST
      path: /api/observability/slos
      body:
        name: Latency SLO
        description: Automatically created SLO for service latency - 85% of requests < 2s target, grouped by service name
        indicator:
          type: sli.kql.custom
          params:
            index: traces-apm.rum-default*,traces-*.otel-*
            filter: processor.event:transaction AND transaction.duration.us:*
            good: transaction.duration.us <= 2000000
            total: transaction.duration.us:*
            timestampField: "@timestamp"
        groupBy:
          - service.name
        budgetingMethod: occurrences
        timeWindow:
          duration: 7d
          type: rolling
        objective:
          target: 0.85
        tags: []
      headers:
        Content-Type: application/json
        Accept: application/json
        kbn-xsrf: "true"

  - name: create-slo-error-rate
    type: kibana.request
    with:
      method: POST
      path: /api/observability/slos
      body:
        name: Error Rate SLO
        description: Automatically created SLO for service error rate - less than 5% error rate target, grouped by service name
        indicator:
          type: sli.kql.custom
          params:
            index: traces-apm.rum-default*,traces-*.otel-*
            filter: processor.event:transaction
            good: NOT event.outcome:failure
            total: "*"
            timestampField: "@timestamp"
        groupBy:
          - service.name
        budgetingMethod: occurrences
        timeWindow:
          duration: 7d
          type: rolling
        objective:
          target: 0.95
        tags: []
      headers:
        Content-Type: application/json
        Accept: application/json
        kbn-xsrf: "true"
