# OpenTelemetry Collector config for Elastic Serverless (OTLP -> Elastic).
# Endpoint and API key are substituted at runtime from ELASTIC_ENDPOINT, ELASTIC_API_KEY.
# Use this for challenges 2-4 (logs, metrics, traces) and 8 (cardinality).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
  # Challenge 8: reduce cardinality by dropping a high-cardinality attribute
  attributes:
    actions:
      - key: request_id
        action: delete
      - key: trace_id
        action: delete
        # Only drop from metrics if you do not need trace correlation on metrics
  resource:
    attributes:
      - key: deployment.environment
        value: workshop
        action: upsert

exporters:
  otlphttp/elastic:
    endpoint: "${ELASTIC_ENDPOINT}"
    headers:
      Authorization: "ApiKey ${ELASTIC_API_KEY}"

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch, attributes, resource]
      exporters: [otlphttp/elastic]
    metrics:
      receivers: [otlp]
      processors: [batch, attributes, resource]
      exporters: [otlphttp/elastic]
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlphttp/elastic]
